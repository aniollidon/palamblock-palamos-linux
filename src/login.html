<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PalamOS Login</title>
    <style>
        @import url("https://fonts.googleapis.com/css?family=Raleway:400,700");
        *, *:before, *:after { box-sizing: border-box; }
        body { min-height: 100vh; font-family: "Raleway", sans-serif; margin: 0; overflow: hidden; }
        .container { position: absolute; width: 100%; height: 100%; overflow: hidden; }
        .container:hover .top:before, .container:hover .top:after, .container:hover .bottom:before, .container:hover .bottom:after, .container:active .top:before, .container:active .top:after, .container:active .bottom:before, .container:active .bottom:after { margin-left: 200px; transform-origin: -200px 50%; transition-delay: 0s; }
        .container:hover .center, .container:active .center { opacity: 1; transition-delay: 0.2s; }
        .top:before, .top:after, .bottom:before, .bottom:after { content: ""; display: block; position: absolute; width: 200vmax; height: 200vmax; top: 50%; left: 50%; margin-top: -100vmax; transform-origin: 0 50%; transition: all 0.5s cubic-bezier(0.445, 0.05, 0, 1); z-index: 10; opacity: 0.65; transition-delay: 0.2s; }
        .top:before { transform: rotate(45deg); background: #F6511D; }
        .top:after { transform: rotate(135deg); background: #FFB400; }
        .bottom:before { transform: rotate(-45deg); background: #00A6ED; }
        .bottom:after { transform: rotate(-135deg); background: #7FB800; }
        .center { position: absolute; width: 420px; min-height: 420px; top: 50%; left: 50%; margin-left: -210px; margin-top: -210px; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 30px; opacity: 1; color: #333; background: rgba(255, 255, 255, 0.9); border-radius: 10px; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1); }
        .center h2 { margin: 0 0 20px 0; color: #333; text-align: center; }
        .center input { width: 100%; padding: 15px; margin: 5px 0; border-radius: 5px; border: 1px solid #ccc; font-family: inherit; font-size: 16px; }
        .center select { width: 100%; padding: 15px; margin: 5px 0; border-radius: 5px; border: 1px solid #ccc; font-family: inherit; font-size: 16px; }
        .center input:focus { outline: none; border-color: #F6511D; box-shadow: 0 0 5px rgba(246, 81, 29, 0.3); }
        #save { cursor: pointer; background-color: #F6511D; color: white; border: none; font-weight: bold; transition: background-color 0.3s; }
        #save:hover { background-color: #d94a1a; }
        #save:active { background-color: #b73b12; }
        #startExamSession { cursor: pointer; background-color: #0077b6; color: white; border: none; font-weight: bold; transition: background-color 0.3s; }
        #startExamSession:hover { background-color: #035f91; }
        .error { color: #F6511D; font-size: 14px; margin-top: 10px; text-align: center; display: none; }
        .success { color: #7FB800; font-size: 14px; margin-top: 10px; text-align: center; display: none; }
        .helper { color: #4a4a4a; font-size: 13px; margin-top: 8px; text-align: center; }
        .auth-badge { width: 100%; text-align: center; font-size: 12px; font-weight: bold; letter-spacing: 0.08em; color: #6b7280; margin-bottom: 10px; }
        .auth-subtitle { width: 100%; text-align: center; font-size: 13px; color: #4b5563; }
        #examStep { display: none; width: 100%; }

        /* Google Material Button Styles */
        .gsi-material-button {
          -moz-user-select: none;
          -webkit-user-select: none;
          -ms-user-select: none;
          -webkit-appearance: none;
          background-color: WHITE !important; /* Mantenir sempre el color blanc */
          background-image: none;
          border: 1px solid #747775 !important; /* Forçar el vora/borde de color gris corporatiu de Google */
          -webkit-border-radius: 20px;
          border-radius: 20px;
          -webkit-box-sizing: border-box;
          box-sizing: border-box;
          color: #1f1f1f !important; /* Lletra sempre de color negre / fosc segons el CSS oficial de Google */
          cursor: pointer;
          font-family: 'Roboto', arial, sans-serif;
          font-size: 14px;
          height: 40px;
          letter-spacing: 0.25px;
          outline: none;
          overflow: hidden;
          padding: 0 12px;
          position: relative;
          text-align: center;
          -webkit-transition: background-color .218s, border-color .218s, box-shadow .218s;
          transition: background-color .218s, border-color .218s, box-shadow .218s;
          vertical-align: middle;
          white-space: nowrap;
          width: auto; /* Mida ajustada al contingut */
          max-width: 400px;
          min-width: min-content;
          margin: 15px auto 5px auto; /* Centrar horitzontalment en bloc */
          display: block; /* Convertir a bloc per fer un autocentrat respecte al pare */
        }

        .gsi-material-button .gsi-material-button-icon {
          height: 20px;
          margin-right: 10px;
          min-width: 20px;
          width: 20px;
        }

        .gsi-material-button .gsi-material-button-content-wrapper {
          -webkit-align-items: center;
          align-items: center;
          display: flex;
          -webkit-flex-direction: row;
          flex-direction: row;
          -webkit-flex-wrap: nowrap;
          flex-wrap: nowrap;
          height: 100%;
          justify-content: space-between;
          position: relative;
          width: 100%;
        }

        .gsi-material-button .gsi-material-button-contents {
          -webkit-flex-grow: 1;
          flex-grow: 1;
          font-family: 'Roboto', arial, sans-serif;
          font-weight: 500;
          overflow: hidden;
          text-overflow: ellipsis;
          vertical-align: top;
        }

        .gsi-material-button .gsi-material-button-state {
          -webkit-transition: opacity .218s;
          transition: opacity .218s;
          bottom: 0;
          left: 0;
          opacity: 0;
          position: absolute;
          right: 0;
          top: 0;
        }

        .gsi-material-button:disabled {
          cursor: default;
          background-color: #ffffff61;
          border-color: #1f1f1f1f;
        }

        .gsi-material-button:disabled .gsi-material-button-contents {
          opacity: 38%;
        }

        .gsi-material-button:disabled .gsi-material-button-icon {
          opacity: 38%;
        }

        .gsi-material-button:not(:disabled):active .gsi-material-button-state, 
        .gsi-material-button:not(:disabled):focus .gsi-material-button-state {
          background-color: #303030;
          opacity: 12%;
        }

        .gsi-material-button:not(:disabled):hover {
          -webkit-box-shadow: 0 1px 2px 0 rgba(60, 64, 67, .30), 0 1px 3px 1px rgba(60, 64, 67, .15);
          box-shadow: 0 1px 2px 0 rgba(60, 64, 67, .30), 0 1px 3px 1px rgba(60, 64, 67, .15);
        }

        .gsi-material-button:not(:disabled):hover .gsi-material-button-state {
          background-color: #303030;
          opacity: 8%;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="top"></div>
        <div class="bottom"></div>
        <div class="center">
            <div id="authBadge" class="auth-badge">REGISTRE MÀQUINA</div>
            <h2 id="authTitle">Autentifica aquest ordinador</h2>
            <div id="authSubtitle" class="auth-subtitle">Registre persistent del dispositiu amb l'usuari base de PalamBlock.</div>
            <input type="text" placeholder="Servidor (ex: http://localhost:3000)" id="serverUrl" list="serverUrlOptions" />
            <datalist id="serverUrlOptions"></datalist>
            <input type="text" placeholder="Nom d'usuari" id="username" />
            <input type="password" placeholder="Contrasenya" id="password" />
            <input type="submit" value="Registra" id="save" />
            <div id="examStep">
                <button class="gsi-material-button" id="startExamSession" onclick="startGoogleAuth()">
                  <div class="gsi-material-button-state"></div>
                  <div class="gsi-material-button-content-wrapper">
                    <div class="gsi-material-button-icon">
                      <svg version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" xmlns:xlink="http://www.w3.org/1999/xlink" style="display: block;">
                        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"></path>
                        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"></path>
                        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"></path>
                        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"></path>
                        <path fill="none" d="M0 0h48v48H0z"></path>
                      </svg>
                    </div>
                    <span class="gsi-material-button-contents" id="startExamSessionText">Accés amb @inspalamos.cat</span>
                    <span style="display: none;">Accés amb @inspalamos.cat</span>
                  </div>
                </button>
                <div class="helper">Aquesta sessió expirarà al cap de 3 hores.</div>
            </div>
            <div id="error" class="error"></div>
            <div id="success" class="success"></div>
        </div>
    </div>

    <script>
        const { ipcRenderer } = require('electron');
        let loginContext = { examOnly: false, baseUser: '' };

        function showError(message) {
            const errorEl = document.getElementById('error');
            const successEl = document.getElementById('success');
            errorEl.textContent = message;
            errorEl.style.display = 'block';
            successEl.style.display = 'none';
        }

        function showSuccess(message) {
            const errorEl = document.getElementById('error');
            const successEl = document.getElementById('success');
            successEl.textContent = message;
            successEl.style.display = 'block';
            errorEl.style.display = 'none';
        }

        function isExamBaseUser(value) {
            return typeof value === 'string' && value.startsWith('examen');
        }

        function showExamStep() {
            document.getElementById('authBadge').textContent = 'REGISTRE TEMPORAL';
            document.getElementById('authTitle').textContent = 'Identificació temporal d\'examen';
            document.getElementById('authSubtitle').textContent = 'Identifica\'t amb el teu compte @inspalamos.cat per iniciar una sessió d\'examen.';
            document.getElementById('serverUrl').style.display = 'none'; // Amaga l'input de l'IP del servidor
            document.getElementById('username').style.display = 'none';
            document.getElementById('password').style.display = 'none';
            document.getElementById('save').style.display = 'none';
            document.getElementById('examStep').style.display = 'block';
        }

        function normalizeServerUrl(rawUrl) {
            const value = String(rawUrl || '').trim();
            if (!value) return '';
            if (/^https?:\/\//i.test(value) || /^wss?:\/\//i.test(value)) return value;
            return `https://${value}`;
        }

        async function loadServerOptions() {
            const options = await ipcRenderer.invoke('get-server-options');
            const input = document.getElementById('serverUrl');
            const datalist = document.getElementById('serverUrlOptions');

            const values = [];
            if (options?.primary) values.push(options.primary);
            if (options?.secondary) values.push(options.secondary);

            datalist.innerHTML = '';
            for (const value of values) {
                const option = document.createElement('option');
                option.value = value;
                datalist.appendChild(option);
            }

            input.value = options?.selected || options?.primary || 'https://palamblock.online';
        }

        async function loadLoginContext() {
            loginContext = await ipcRenderer.invoke('get-login-context') || { examOnly: false, baseUser: '' };
            if (!loginContext.examOnly) return;

            const usernameInput = document.getElementById('username');
            usernameInput.value = loginContext.baseUser || '';
            showExamStep();
        }

        async function startGoogleAuth() {
            const btn = document.getElementById('startExamSession');
            const txt = document.getElementById('startExamSessionText');
            const originalText = txt.textContent;
            
            txt.textContent = "Connectant...";
            btn.disabled = true;

            const baseUser = document.getElementById('username').value.trim();

            try {
                // Obrir la finestra de Google Auth controlada per Electron
                const authResult = await ipcRenderer.invoke('start-google-auth');
                
                if (!authResult || !authResult.ok) {
                    showError(authResult?.error || "Autenticació cancel·lada");
                    txt.textContent = originalText;
                    btn.disabled = false;
                    return;
                }

                txt.textContent = "Validant...";
                
                // Enviar l'id_token al servidor (via HTTP palamSRV directament o a través d'IPC de main per mantenir tokens).
                // Ho demanem a main.js perquè allà té la informació del Servidor seleccionat
                const started = await ipcRenderer.invoke('start-exam-session', {
                    baseUser,
                    code: authResult.code,
                    ttlHours: 3,
                });

                if (!started || !started.ok) {
                    showError(started?.error || "Error validant les dades al servidor central");
                    txt.textContent = originalText;
                    btn.disabled = false;
                    return;
                }

                showSuccess("Sessió temporal iniciada. Connectant...");
                txt.textContent = "Sessió iniciada";
                setTimeout(() => {
                    ipcRenderer.invoke('login-completed');
                }, 600);

            } catch (err) {
                showError("S'ha produït un error de connexió intern: " + err.message);
                txt.textContent = originalText;
                btn.disabled = false;
            }
        }

        async function saveUser() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const serverUrl = normalizeServerUrl(document.getElementById('serverUrl').value);

            if (serverUrl === '' || username === '' || password === '') {
                showError("Cal especificar servidor, usuari i contrasenya");
                return;
            }

            try {
                // 1) Valida contra el servidor
                const serverSaved = await ipcRenderer.invoke('set-server-url', serverUrl);
                if (!serverSaved || !serverSaved.ok) {
                    showError("No s'ha pogut guardar el servidor seleccionat");
                    return;
                }

                const validation = await ipcRenderer.invoke('validate-credentials', { username, password, serverUrl });
                if (!validation || !validation.ok) {
                    if (validation && validation.reason === 'invalid') {
                        showError("Credencials incorrectes");
                    } else if (validation && validation.reason === 'server') {
                        showError("Error del servidor d'autenticació");
                    } else {
                        showError("No s'ha pogut validar l'usuari (xarxa)");
                    }
                    return;
                }

                // 2) Desa l'usuari si la validació és correcta
                const saved = await ipcRenderer.invoke('save-username', username);
                if (!saved || !saved.success) {
                    showError("Error guardant l'usuari");
                    return;
                }

                if (isExamBaseUser(username)) {
                    showSuccess("Usuari examen registrat. Cal iniciar la sessió temporal.");
                    showExamStep();
                    return;
                }

                showSuccess("Usuari registrat correctament");
                setTimeout(() => {
                    ipcRenderer.invoke('login-completed');
                }, 1000);
            } catch (e) {
                showError("Error: " + (e && e.message ? e.message : 'desconegut'));
            }
        }

        document.getElementById('save').addEventListener('click', saveUser);
        document.getElementById('startExamSession').addEventListener('click', async () => {
            const baseUser = (loginContext.examOnly ? loginContext.baseUser : document.getElementById('username').value || '').trim();
            await startExamSession(baseUser);
        });
        document.addEventListener('keydown', async function(e) {
            if (e.key !== 'Enter') return;
            const examVisible = document.getElementById('examStep').style.display === 'block';
            if (examVisible) {
                const baseUser = (loginContext.examOnly ? loginContext.baseUser : document.getElementById('username').value || '').trim();
                await startExamSession(baseUser);
                return;
            }
            saveUser();
        });
        document.getElementById('username').focus();
        loadServerOptions();
        loadLoginContext();
    </script>
</body>
</html>
